name: Rust version

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  msrv:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - uses: taiki-e/install-action@50414676f9f5d50a65992c6dd2ed02641263226c # cargo-hack
      with:
        tool: cargo-hack
    - run: cargo hack check --rust-version --workspace --all-targets
